name: Bug report
description: Something in the status line renders wrong or crashes.
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you see, and what did you expect instead? A screenshot helps for visual issues.
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: OS, Node version (`node -v`), and terminal / font.
      placeholder: "e.g. Windows 11, Node 20.11, Windows Terminal + CaskaydiaCove NF"
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Config (optional)
      description: Contents of your ~/.claude/ccline.config.json, if you have one.
      render: json
